<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reklam</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src='//libtl.com/sdk.js' data-zone='10878049' data-sdk='show_10878049'></script>
  <style>
    body { margin: 0; background: #1a1a2e; display: flex; flex-direction: column;
           align-items: center; justify-content: center; height: 100vh;
           font-family: Arial, sans-serif; color: #fff; text-align: center; }
    .card { background: #16213e; border-radius: 16px; padding: 32px 24px; max-width: 320px; }
    h2 { margin: 0 0 8px; font-size: 22px; }
    p  { margin: 0 0 24px; color: #aaa; font-size: 14px; }
    #adContainer { min-height: 250px; display: flex; align-items: center;
                   justify-content: center; border: 1px dashed #444;
                   border-radius: 8px; margin-bottom: 20px; color: #666; font-size: 13px; }
    button { width: 100%; padding: 14px; border: none; border-radius: 10px;
             background: #0f3460; color: #fff; font-size: 16px; cursor: pointer; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    #status { margin-top: 12px; font-size: 13px; color: #4ecca3; min-height: 18px; }
    #countdown { font-size: 13px; color: #ff6b6b; margin-top: 8px; min-height: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>📢 Reklam</h2>
    <p>Testi açmaq üçün reklamı izləyin</p>
    <div id="adContainer">Reklam yüklənir...</div>
    <button id="watchBtn" onclick="watchAd()">▶️ Reklamı İzlə</button>
    <div id="status"></div>
    <div id="countdown"></div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Reklamın hansı kontekstdə olduğunu URL hash-dən oxuyuruq
    // bot bu HTML-i belə açacaq:
    //   ?...#ctx=start  → /start sonrası reklam (ana menyuya keçid)
    //   ?...#ctx=cont   → test arası reklam (növbəti suala keçid)
    const hash = window.location.hash.replace('#', '');
    const params = new URLSearchParams(hash);
    const ctx = params.get('ctx') || 'start';

    let countdownTimer = null;
    let confirmed = false;

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }
    function setCountdown(msg) {
      document.getElementById('countdown').textContent = msg;
    }

    function confirmAndClose(reason) {
      if (confirmed) return;
      confirmed = true;
      // Bota məlumat göndər: reklam tamamlandı + kontekst + səbəb + timestamp.
      // Bot bu siqnalı yoxlayır — manual keçid yoxdur.
      const payload = JSON.stringify({
        type: 'ad_done',
        ctx: ctx,
        reason: reason,
        ts: Date.now()
      });
      try {
        tg.sendData(payload);
      } catch (e) {
        setStatus('❌ Bota siqnal göndərilə bilmədi: ' + e.message);
      }
    }

    function watchAd() {
      const btn = document.getElementById('watchBtn');
      btn.disabled = true;
      setStatus('Reklam başlayır...');

      let waited = 0;
      countdownTimer = setInterval(() => {
        waited++;
        setCountdown(`⏳ Reklam müddəti: ${waited}s...`);
      }, 1000);

      show_10878049().then(() => {
        clearInterval(countdownTimer);
        setStatus('✅ Reklam tamamlandı!');
        setCountdown('');
        btn.textContent = '✅ Reklam İzləndi';
        btn.style.background = '#1a6640';
        confirmAndClose('completed');
      }).catch(e => {
        clearInterval(countdownTimer);
        // Reklam yüklənmədisə və minimum 5 saniyə keçibsə, yenə də icazə ver.
        // Bu, monetag bəzən boş zonadan reklam göstərə bilməyəndə işləyir.
        if (waited >= 5) {
          setStatus('ℹ️ Reklam yüklənmədi.');
          setCountdown('');
          btn.textContent = '✅ Davam et';
          btn.style.background = '#1a6640';
          confirmAndClose('no_inventory');
        } else {
          setStatus('⚠️ Reklam yüklənmədi. Bir az gözləyib yenə cəhd edin.');
          setCountdown('');
          btn.disabled = false;
          btn.textContent = '▶️ Yenidən Cəhd Et';
        }
      });
    }
  </script>
</body>
</html>
